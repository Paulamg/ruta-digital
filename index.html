<!DOCTYPE html>
<html lang="es">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Ruta Digital — Diagnóstico</title>
<link href="https://fonts.googleapis.com/css2?family=Syne:wght@700;800&family=Inter:wght@300;400;500&display=swap" rel="stylesheet">
<style>
  *, *::before, *::after { box-sizing: border-box; margin: 0; padding: 0; }

  :root {
    --bg: #0A0A0A;
    --surface: #111111;
    --surface2: #181818;
    --border: #222222;
    --accent: #FF4D1C;
    --accent2: #FF8C5A;
    --text: #F5F0E8;
    --text-muted: #E8E0D0;
    --text-dim: #BBAA99;
    --success: #2ECC71;
    --radius: 12px;
  }

  html, body {
    background: var(--bg);
    color: var(--text);
    font-family: 'Inter', sans-serif;
    min-height: 100vh;
    -webkit-font-smoothing: antialiased;
  }

  /* LAYOUT */
  .app {
    max-width: 640px;
    margin: 0 auto;
    padding: 0 20px 60px;
    min-height: 100vh;
  }

  /* HEADER */
  .header {
    padding: 32px 0 24px;
    display: flex;
    align-items: center;
    justify-content: space-between;
  }

  .logo {
    font-family: 'Syne', sans-serif;
    font-weight: 800;
    font-size: 18px;
    letter-spacing: 0.05em;
    color: var(--text);
  }
  .logo span { color: var(--accent); }

  .lang-toggle {
    display: flex;
    background: var(--surface);
    border: 1px solid var(--border);
    border-radius: 20px;
    overflow: hidden;
    cursor: pointer;
  }
  .lang-btn {
    padding: 6px 14px;
    font-size: 12px;
    font-weight: 500;
    color: var(--text-muted);
    background: transparent;
    border: none;
    cursor: pointer;
    transition: all 0.2s;
    font-family: 'Inter', sans-serif;
  }
  .lang-btn.active {
    background: var(--accent);
    color: #fff;
    border-radius: 20px;
  }

  /* PROGRESS */
  .progress-wrap {
    margin-bottom: 32px;
  }
  .progress-info {
    display: flex;
    justify-content: space-between;
    align-items: center;
    margin-bottom: 8px;
  }
  .progress-label {
    font-size: 11px;
    letter-spacing: 0.15em;
    text-transform: uppercase;
    color: #E8E0D0;
  }
  .progress-count {
    font-family: 'Syne', sans-serif;
    font-size: 13px;
    font-weight: 700;
    color: var(--accent);
  }
  .progress-bar {
    height: 3px;
    background: var(--border);
    border-radius: 2px;
    overflow: hidden;
  }
  .progress-fill {
    height: 100%;
    background: linear-gradient(90deg, var(--accent), var(--accent2));
    border-radius: 2px;
    transition: width 0.4s ease;
  }

  /* QUESTION CARD */
  .question-card {
    animation: slideIn 0.3s ease;
  }
  @keyframes slideIn {
    from { opacity: 0; transform: translateY(16px); }
    to { opacity: 1; transform: translateY(0); }
  }

  .q-number {
    font-size: 11px;
    letter-spacing: 0.2em;
    text-transform: uppercase;
    color: var(--accent);
    margin-bottom: 10px;
  }

  .q-text {
    font-family: 'Syne', sans-serif;
    font-size: 22px;
    font-weight: 700;
    line-height: 1.4;
    color: var(--text);
    margin-bottom: 10px;
  }

  .q-hint {
    font-size: 13px;
    color: #FFD580;
    margin-bottom: 24px;
    font-style: normal;
    font-weight: 500;
  }

  /* OPTIONS */
  .options {
    display: flex;
    flex-direction: column;
    gap: 10px;
  }

  .option {
    display: flex;
    align-items: center;
    gap: 14px;
    padding: 14px 18px;
    background: var(--surface);
    border: 1px solid var(--border);
    border-radius: var(--radius);
    cursor: pointer;
    transition: all 0.15s;
    text-align: left;
    width: 100%;
    color: var(--text);
    font-family: 'Inter', sans-serif;
    font-size: 14px;
  }
  .option:hover {
    border-color: var(--accent);
    background: var(--surface2);
  }
  .option.selected {
    border-color: var(--accent);
    background: rgba(255, 77, 28, 0.08);
    color: var(--text);
  }
  .option-check {
    width: 18px;
    height: 18px;
    border-radius: 50%;
    border: 2px solid var(--border);
    flex-shrink: 0;
    transition: all 0.15s;
    display: flex;
    align-items: center;
    justify-content: center;
  }
  .option.selected .option-check {
    background: var(--accent);
    border-color: var(--accent);
  }
  .option.selected .option-check::after {
    content: '';
    width: 6px;
    height: 6px;
    background: #fff;
    border-radius: 50%;
  }

  /* CHECKBOX OPTIONS (multi) */
  .option .option-check.square {
    border-radius: 4px;
  }
  .option.disabled-opt {
    opacity: 0.35;
    cursor: not-allowed;
  }
  .option.selected .option-check.square::after {
    content: '✓';
    font-size: 10px;
    color: #fff;
    font-weight: 700;
  }

  /* TEXT INPUT */
  .text-input {
    width: 100%;
    background: var(--surface);
    border: 1px solid var(--border);
    border-radius: var(--radius);
    padding: 14px 18px;
    color: var(--text);
    font-family: 'Inter', sans-serif;
    font-size: 15px;
    outline: none;
    transition: border-color 0.15s;
  }
  .text-input:focus {
    border-color: var(--accent);
  }
  .text-input::placeholder {
    color: var(--text-dim);
  }

  /* NAVIGATION */
  .nav {
    display: flex;
    justify-content: space-between;
    align-items: center;
    margin-top: 28px;
  }

  .btn-back {
    background: transparent;
    border: 1px solid var(--border);
    color: #E8E0D0;
    padding: 12px 20px;
    border-radius: 8px;
    font-family: 'Inter', sans-serif;
    font-size: 14px;
    cursor: pointer;
    transition: all 0.15s;
  }
  .btn-back:hover { border-color: var(--text-muted); color: var(--text); }

  .btn-next {
    background: var(--accent);
    border: none;
    color: #fff;
    padding: 13px 28px;
    border-radius: 8px;
    font-family: 'Syne', sans-serif;
    font-size: 14px;
    font-weight: 700;
    cursor: pointer;
    transition: all 0.15s;
    margin-left: auto;
  }
  .btn-next:hover { background: var(--accent2); transform: translateY(-1px); }
  .btn-next:disabled { opacity: 0.3; cursor: not-allowed; transform: none; }

  /* INTRO SCREEN */
  .intro {
    padding-top: 40px;
    animation: slideIn 0.4s ease;
  }
  .intro-tag {
    display: inline-block;
    background: rgba(255,77,28,0.12);
    color: var(--accent);
    font-size: 11px;
    letter-spacing: 0.15em;
    text-transform: uppercase;
    padding: 6px 14px;
    border-radius: 20px;
    margin-bottom: 20px;
    font-weight: 500;
  }
  .intro h1 {
    font-family: 'Syne', sans-serif;
    font-size: 40px;
    font-weight: 800;
    line-height: 1.1;
    margin-bottom: 16px;
  }
  .intro h1 em {
    color: var(--accent);
    font-style: normal;
  }
  .intro p {
    font-size: 16px;
    color: #E8E0D0;
    line-height: 1.7;
    margin-bottom: 32px;
    max-width: 480px;
  }
  .intro-stats {
    display: flex;
    gap: 20px;
    margin-bottom: 36px;
  }
  .stat {
    background: var(--surface);
    border: 1px solid var(--border);
    border-radius: var(--radius);
    padding: 14px 20px;
    flex: 1;
    text-align: center;
  }
  .stat-num {
    font-family: 'Syne', sans-serif;
    font-size: 22px;
    font-weight: 800;
    color: var(--accent);
  }
  .stat-label {
    font-size: 12px;
    color: #E8E0D0;
    margin-top: 2px;
  }
  .btn-start {
    background: var(--accent);
    border: none;
    color: #fff;
    padding: 16px 36px;
    border-radius: 8px;
    font-family: 'Syne', sans-serif;
    font-size: 15px;
    font-weight: 700;
    cursor: pointer;
    transition: all 0.2s;
    width: 100%;
  }
  .btn-start:hover { background: var(--accent2); transform: translateY(-2px); }

  /* LOADING */
  .loading {
    text-align: center;
    padding: 60px 20px;
    animation: slideIn 0.4s ease;
  }
  .loading-icon {
    width: 56px;
    height: 56px;
    border: 3px solid var(--border);
    border-top-color: var(--accent);
    border-radius: 50%;
    margin: 0 auto 24px;
    animation: spin 0.8s linear infinite;
  }
  @keyframes spin { to { transform: rotate(360deg); } }
  .loading h2 {
    font-family: 'Syne', sans-serif;
    font-size: 20px;
    font-weight: 700;
    margin-bottom: 8px;
  }
  .loading p { font-size: 14px; color: var(--text-muted); }

  /* RESULT */
  .result {
    animation: slideIn 0.4s ease;
  }
  .result-header {
    background: var(--surface);
    border: 1px solid var(--border);
    border-radius: var(--radius);
    padding: 24px;
    margin-bottom: 20px;
    display: flex;
    align-items: center;
    gap: 20px;
  }
  .level-badge {
    width: 64px;
    height: 64px;
    border-radius: 12px;
    display: flex;
    align-items: center;
    justify-content: center;
    font-family: 'Syne', sans-serif;
    font-size: 11px;
    font-weight: 800;
    letter-spacing: 0.05em;
    text-align: center;
    flex-shrink: 0;
    line-height: 1.2;
  }
  .level-bajo { background: rgba(255,77,28,0.15); color: #FF4D1C; border: 1px solid rgba(255,77,28,0.3); }
  .level-medio { background: rgba(255,193,28,0.15); color: #FFC11C; border: 1px solid rgba(255,193,28,0.3); }
  .level-alto { background: rgba(46,204,113,0.15); color: #2ECC71; border: 1px solid rgba(46,204,113,0.3); }

  .result-header-text h2 {
    font-family: 'Syne', sans-serif;
    font-size: 18px;
    font-weight: 700;
    margin-bottom: 4px;
  }
  .result-header-text p { font-size: 14px; color: #E8E0D0; }

  .result-body {
    background: var(--surface);
    border: 1px solid var(--border);
    border-radius: var(--radius);
    padding: 28px;
    margin-bottom: 20px;
    font-size: 15px;
    line-height: 1.9;
    color: #F0EAE0;
  }
  .result-body strong {
    color: var(--text);
    font-weight: 600;
  }
  .phase2-block {
    background: rgba(255,77,28,0.05);
    border: 1px solid rgba(255,77,28,0.15);
    border-radius: 10px;
    padding: 20px;
    margin-top: 16px;
  }
  .phase2-item {
    display: flex;
    gap: 12px;
    align-items: flex-start;
    padding: 10px 0;
    border-bottom: 1px solid rgba(255,255,255,0.05);
    font-size: 14px;
    line-height: 1.6;
    color: #CCC;
  }
  .phase2-item:last-child { border-bottom: none; }
  .phase2-emoji { font-size: 18px; flex-shrink: 0; padding-top: 1px; }
  .result-body h3 {
    font-family: 'Syne', sans-serif;
    font-size: 16px;
    font-weight: 800;
    color: var(--accent);
    text-transform: uppercase;
    letter-spacing: 0.08em;
    margin: 24px 0 10px;
    padding-bottom: 6px;
    border-bottom: 1px solid rgba(255,77,28,0.2);
  }
  .result-body h3:first-child { margin-top: 0; }
  .result-body h4 {
    font-family: 'Syne', sans-serif;
    font-size: 13px;
    font-weight: 700;
    color: #F5F0E8;
    text-transform: uppercase;
    letter-spacing: 0.1em;
    margin: 18px 0 6px;
  }
  .result-body strong {
    color: #FFFFFF;
    font-weight: 600;
  }
  .result-body em {
    color: #E8E0D0;
    font-style: italic;
  }
  .result-body br + br {
    display: block;
    margin: 4px 0;
  }

  .result-cta {
    background: linear-gradient(135deg, var(--accent), var(--accent2));
    border-radius: var(--radius);
    padding: 24px;
    text-align: center;
  }
  .result-cta h3 {
    font-family: 'Syne', sans-serif;
    font-size: 18px;
    font-weight: 800;
    color: #fff;
    margin-bottom: 6px;
  }
  .result-cta p { font-size: 13px; color: rgba(255,255,255,0.8); margin-bottom: 16px; }
  .btn-cta {
    background: #fff;
    color: var(--accent);
    border: none;
    padding: 12px 28px;
    border-radius: 8px;
    font-family: 'Syne', sans-serif;
    font-size: 13px;
    font-weight: 800;
    cursor: pointer;
    transition: all 0.15s;
  }
  .btn-cta:hover { transform: translateY(-1px); }

  /* TRIANGLE DISPLAY */
  .triangle-wrap {
    background: var(--surface);
    border: 1px solid var(--border);
    border-radius: var(--radius);
    padding: 20px;
    margin-bottom: 16px;
  }
  .triangle-label {
    font-size: 10px;
    letter-spacing: 0.2em;
    text-transform: uppercase;
    color: var(--text-dim);
    margin-bottom: 16px;
  }
  .triangle-grid {
    display: grid;
    grid-template-columns: 1fr 1fr 1fr;
    gap: 10px;
  }
  .tri-vertex {
    background: var(--surface2);
    border: 1px solid var(--border);
    border-radius: 10px;
    padding: 14px 10px;
    text-align: center;
  }
  .tri-icon {
    font-size: 18px;
    margin-bottom: 6px;
    color: var(--accent);
  }
  .tri-name {
    font-family: 'Inter', sans-serif;
    font-size: 11px;
    font-weight: 700;
    letter-spacing: 0.12em;
    color: #F5F0E8;
    margin-bottom: 8px;
  }
  .tri-state {
    font-size: 10px;
    font-weight: 500;
    padding: 3px 8px;
    border-radius: 10px;
    display: inline-block;
  }
  .state-low { background: rgba(255,77,28,0.15); color: #FF4D1C; }
  .state-mid { background: rgba(255,193,28,0.15); color: #FFC11C; }
  .state-high { background: rgba(46,204,113,0.15); color: #2ECC71; }

  .btn-restart {
    width: 100%;
    margin-top: 12px;
    background: transparent;
    border: 1px solid var(--border);
    color: var(--text-muted);
    padding: 12px;
    border-radius: 8px;
    font-family: 'Inter', sans-serif;
    font-size: 13px;
    cursor: pointer;
    transition: all 0.15s;
  }
  .btn-restart:hover { border-color: var(--text-muted); color: var(--text); }

  @media print {
    .header, .btn-restart, .btn-download { display: none !important; }
    body { background: white !important; color: black !important; }
    .app { padding: 0 !important; }
    .result-header { background: #f5f5f5 !important; border: 1px solid #ddd !important; }
    .triangle-wrap { background: #f5f5f5 !important; border: 1px solid #ddd !important; }
    .tri-vertex { background: #eee !important; border: 1px solid #ddd !important; }
    .result-body { background: #f9f9f9 !important; border: 1px solid #ddd !important; color: #222 !important; }
    .level-badge { -webkit-print-color-adjust: exact; print-color-adjust: exact; }
    .tri-state { -webkit-print-color-adjust: exact; print-color-adjust: exact; }
    .result-body h3 { color: #FF4D1C !important; -webkit-print-color-adjust: exact; print-color-adjust: exact; }
  }

  .btn-download {
    width: 100%;
    margin-top: 12px;
    background: var(--surface);
    border: 1px solid var(--accent);
    color: var(--accent);
    padding: 13px;
    border-radius: 8px;
    font-family: 'Syne', sans-serif;
    font-size: 13px;
    font-weight: 700;
    cursor: pointer;
    transition: all 0.15s;
    display: flex;
    align-items: center;
    justify-content: center;
    gap: 8px;
  }
  .btn-download:hover { background: rgba(255,77,28,0.08); }

  @media (max-width: 480px) {
    .intro h1 { font-size: 30px; }
    .q-text { font-size: 18px; }
    .intro-stats { flex-direction: column; }
  }
</style>
</head>
<body>
<div class="app">
  <div class="header">
    <div class="logo">RUTA <span>DIGITAL</span></div>
    <div class="lang-toggle">
      <button class="lang-btn active" onclick="setLang('es')" id="btn-es">ES</button>
      <button class="lang-btn" onclick="setLang('en')" id="btn-en">EN</button>
    </div>
  </div>

  <div id="screen"></div>
</div>

<script>
const T = {
  es: {
    progress: "Pregunta",
    of: "de",
    back: "← Atrás",
    next: "Continuar →",
    submit: "Ver mi diagnóstico →",

    stat1_num: "17", stat1_label: "preguntas",

    loading_h: "Analizando tu negocio...",

    result_cta_h: "¿Listo para recorrer tu Ruta Digital?",

    intro_h1: "Find out where your\n<em>digital business</em> stands",
    intro_p: "Answer 17 questions and receive a personalized diagnosis with your digitalization level and the exact steps you should take first.",
    stat1_num: "17", stat1_label: "questions",
    stat2_num: "3 min", stat2_label: "average time",
    stat3_num: "100%", stat3_label: "free",

    restart: "Diagnose another business",
    nivel: "Level",
  }
};

const questions = {
  es: [
    { id: "nombre", type: "text", q: "¿Cuál es tu nombre y el nombre de tu negocio?", hint: "Ej: María López — Tienda Floral", placeholder: "Tu nombre — Nombre del negocio" },
    { id: "sector", type: "single", q: "¿A qué sector pertenece tu negocio?", options: ["Moda / Belleza / Bienestar","Alimentos y bebidas","Turismo / Experiencias","Educación / Formación","Tecnología / Software","Salud","Comercio / Retail","Servicios profesionales","Otro"] },
    { id: "tipo_venta", type: "multi", q: "¿Qué vendes?", hint: "Selecciona todos los que apliquen", options: ["Productos físicos","Servicios","Infoproductos / cursos digitales","Experiencias / eventos"] },

    { id: "vende_online", type: "single", q: "¿Tu negocio vende online actualmente?", options: ["Sí, tenemos un sistema claro de ventas online","Algo, pero no está bien estructurado","No, todas las ventas son presenciales o por WhatsApp","Estamos en proceso de montarlo"] },
    { id: "canales", type: "multi", q: "¿En qué canales digitales tienes presencia activa?", hint: "Selecciona todos los que apliquen", options: ["Instagram","Facebook","TikTok","YouTube","LinkedIn","Pinterest","Página web","WhatsApp Business","Ninguno"] },
    { id: "seguidores", type: "single", q: "¿Cuántos seguidores tiene tu red social principal?", options: ["Menos de 500","500 – 2,000","2,000 – 10,000","10,000 – 50,000","50,000 – 200,000","Más de 200,000"] },
    { id: "pauta", type: "single", q: "¿Estás realizando pauta paga actualmente?", options: ["Sí, de forma constante y con estrategia clara","Sí, pero sin una estrategia definida","Lo he hecho antes pero no actualmente","No, nunca he pautado"] },
    { id: "contenido_video", type: "single", q: "¿Grabas contenido de video para tus redes?", options: ["Sí, regularmente (reels, tiktoks, lives)","Ocasionalmente","No, solo imágenes o texto","Quiero empezar pero no sé cómo"] },
    { id: "automatizacion", type: "single", q: "¿Tienes algún sistema de automatización para atender clientes?", options: ["Sí, tengo respuestas automáticas y flujos configurados","Tengo WhatsApp Business pero sin configurar bien","Solo respondo manualmente","No tengo nada automatizado"] },

let lang = 'es';
let step = -1; // -1 = intro
let answers = {};
let multiSelected = {};

function setLang(l) {
  lang = l;
  document.getElementById('btn-es').classList.toggle('active', l === 'es');
  document.getElementById('btn-en').classList.toggle('active', l === 'en');
  if (step === -1) renderIntro();
  else if (step >= 0 && step < questions[lang].length) renderQuestion();
}

function t(key) { return T[lang][key]; }
function qs() { return questions[lang]; }

function renderIntro() {
  const s = document.getElementById('screen');
  s.innerHTML = `
    <div class="intro">
      <div class="intro-tag">${t('intro_tag')}</div>
      <h1>${t('intro_h1').replace(/\n/g, '<br>')}</h1>
      <p>${t('intro_p')}</p>
      <div class="intro-stats">
        <div class="stat"><div class="stat-num">${t('stat1_num')}</div><div class="stat-label">${t('stat1_label')}</div></div>
        <div class="stat"><div class="stat-num">${t('stat2_num')}</div><div class="stat-label">${t('stat2_label')}</div></div>
        <div class="stat"><div class="stat-num">${t('stat3_num')}</div><div class="stat-label">${t('stat3_label')}</div></div>
      </div>
      <button class="btn-start" onclick="startQuiz()">${t('start')}</button>
    </div>
  `;
}

function startQuiz() {
  step = 0;
  answers = {};
  multiSelected = {};
  renderQuestion();
}

function renderQuestion() {
  const q = qs()[step];
  const total = qs().length;
  const pct = Math.round((step / total) * 100);
  const currentAnswer = answers[q.id];
  const currentMulti = multiSelected[q.id] || [];

  let optionsHtml = '';
  if (q.type === 'text') {
    optionsHtml = `<input class="text-input" type="text" id="text-input" placeholder="${q.placeholder || ''}" value="${currentAnswer || ''}" oninput="answers['${q.id}'] = this.value; updateNext()">`;
  } else if (q.type === 'single') {
    optionsHtml = `<div class="options">` + q.options.map((opt, i) => `
      <button class="option ${currentAnswer === opt ? 'selected' : ''}" onclick="selectOption('${q.id}', '${opt.replace(/'/g,"\\'")}', false)">
        <div class="option-check"></div>
        <span>${opt}</span>
      </button>
    `).join('') + `</div>`;
  } else if (q.type === 'multi') {
    const maxSel = q.max || 99;
    optionsHtml = `<div class="options">` + q.options.map((opt, i) => {
      const isSelected = currentMulti.includes(opt);
      const isDisabled = !isSelected && currentMulti.length >= maxSel;
      return `<button class="option ${isSelected ? 'selected' : ''} ${isDisabled ? 'disabled-opt' : ''}" onclick="selectMulti('${q.id}', '${opt.replace(/'/g,"\\'")}')">
        <div class="option-check square"></div>
        <span>${opt}</span>
      </button>`;
    }).join('') + `</div>`;
  }

  const isLast = step === total - 1;
  const hasAnswer = q.type === 'multi' ? currentMulti.length > 0 : !!currentAnswer;

  document.getElementById('screen').innerHTML = `
    <div class="progress-wrap">
      <div class="progress-info">
        <span class="progress-label">${t('progress')} ${step + 1} ${t('of')} ${total}</span>
        <span class="progress-count">${pct}%</span>
      </div>
      <div class="progress-bar"><div class="progress-fill" style="width:${pct}%"></div></div>
    </div>
    <div class="question-card">
      <div class="q-number">${String(step + 1).padStart(2, '0')}</div>
      <div class="q-text">${q.q}</div>
      ${q.hint ? `<div class="q-hint">${q.hint}</div>` : ''}
      ${optionsHtml}
      <div class="nav">
        ${step > 0 ? `<button class="btn-back" onclick="goBack()">${t('back')}</button>` : '<div></div>'}
        <button class="btn-next" id="btn-next" onclick="goNext()" ${hasAnswer ? '' : 'disabled'}>${isLast ? t('submit') : t('next')}</button>
      </div>
    </div>
  `;
}

function selectOption(id, value, multi) {
  answers[id] = value;
  goNext();
}

function selectMulti(id, value) {
  if (!multiSelected[id]) multiSelected[id] = [];
  const idx = multiSelected[id].indexOf(value);
  const q = qs()[step];
  const maxSelect = q.max || 99;
  if (idx === -1) {
    if (multiSelected[id].length >= maxSelect) return; // enforce max
    multiSelected[id].push(value);
  } else {
    multiSelected[id].splice(idx, 1);
  }
  answers[id] = multiSelected[id].join(', ');
  renderQuestion();
}

function updateNext() {
  const q = qs()[step];
  const btn = document.getElementById('btn-next');
  if (btn) btn.disabled = !answers[q.id];
}

function goNext() {
  const total = qs().length;
  if (step < total - 1) {
    step++;
    renderQuestion();
    window.scrollTo(0, 0);
  } else {
    renderContact();
  }
}

function updateContactNext() {
  const email = document.getElementById('contact-email')?.value || '';

function goBack() {
  if (step > 0) { step--; renderQuestion(); window.scrollTo(0, 0); }
  else { step = -1; renderIntro(); }
}

function renderResult(text) {
  // Detect level
  let levelClass = 'level-bajo';
  let levelText = lang === 'es' ? 'BAJO' : 'LOW';
  const lower = text.toLowerCase();
  if (lower.includes('alto') && (lower.includes('nivel') || lower.includes('level'))) {
    levelClass = 'level-alto'; levelText = lang === 'es' ? 'ALTO' : 'HIGH';
  } else if (lower.includes('medio') || lower.includes('medium')) {
    levelClass = 'level-medio'; levelText = lang === 'es' ? 'MEDIO' : 'MEDIUM';
  }

  // Detect triangle states
  function detectState(keyword, states) {
    for (const [label, cssClass] of states) {
      if (lower.includes(label.toLowerCase())) return { label, cssClass };
    }
    return states[0];
  }

  const rutaStates = lang === 'es'
    ? [['Parcial', 'state-mid'], ['Rota', 'state-low'], ['Optimizada', 'state-high']]
    : [['Partial', 'state-mid'], ['Broken', 'state-low'], ['Optimized', 'state-high']];
  const msgStates = lang === 'es'
    ? [['Inconsistente', 'state-mid'], ['Confuso', 'state-low'], ['Claro', 'state-high']]
    : [['Inconsistent', 'state-mid'], ['Confused', 'state-low'], ['Clear', 'state-high']];
  const ofertaStates = lang === 'es'
    ? [['Desorganizada', 'state-mid'], ['Incompleta', 'state-low'], ['Bien estructurada', 'state-high']]
    : [['Disorganized', 'state-mid'], ['Incomplete', 'state-low'], ['Well structured', 'state-high']];

  const rutaState = detectState('ruta', rutaStates);
  const msgState = detectState('mensaje', msgStates);
  const ofertaState = detectState('oferta', ofertaStates);

  // Format markdown to HTML
  const formatted = text
    // Headers ## and ###
    .replace(/^### (.+)$/gm, '<h4>$1</h4>')
    .replace(/^## (.+)$/gm, '<h3>$1</h3>')
    .replace(/^# (.+)$/gm, '<h3>$1</h3>')
    // Bold
    .replace(/\*\*(.+?)\*\*/g, '<strong>$1</strong>')
    // Italic
    .replace(/\*(.+?)\*/g, '<em>$1</em>')
    // Section headers in caps with dash
    .replace(/—\s*(RUTA|MENSAJE|OFERTA|ROUTE|MESSAGE|OFFER)[:\s]*/gi, '<h4>$1</h4>')
    .replace(/(NIVEL DE DIGITALIZACIÓN|DIGITALIZATION LEVEL)[:\s]*(Bajo|Medio|Alto|Low|Medium|High)?/gi, '<h3>$1</h3>')
    .replace(/(EL TRIÁNGULO DIGITAL DE TU NEGOCIO|YOUR BUSINESS\'S DIGITAL TRIANGLE)[:\s]*/gi, '<h3>$1</h3>')
    .replace(/(LO QUE DEBES OPTIMIZAR EN LA FASE 2|WHAT YOU NEED TO OPTIMIZE IN PHASE 2)[:\s]*/gi, '<h3>$1</h3>')
    // Line breaks — but not after headers
    .replace(/\n\n/g, '<br><br>')
    .replace(/\n(?!<)/g, '<br>');

  const businessName = answers['nombre'] ? answers['nombre'].split('—')[1]?.trim() || answers['nombre'].split('-')[1]?.trim() || answers['nombre'] : '';

  document.getElementById('screen').innerHTML = `
    <div class="result">
      <div class="result-header">
        <div class="level-badge ${levelClass}">${t('nivel')}<br>${levelText}</div>
        <div class="result-header-text">
          <h2>${lang === 'es' ? 'Tu diagnóstico está listo' : 'Your diagnosis is ready'}${businessName ? ` — ${businessName}` : ''}</h2>
          <p>${lang === 'es' ? 'Basado en tus respuestas, esto es lo que encontramos:' : 'Based on your answers, here is what we found:'}</p>
        </div>
      </div>

      <div class="triangle-wrap">
        <div class="triangle-label">${lang === 'es' ? 'El Triángulo Digital' : 'The Digital Triangle'}</div>
        <div class="triangle-grid">
          <div class="tri-vertex">
            <div class="tri-icon">⟶</div>
            <div class="tri-name">${lang === 'es' ? 'RUTA' : 'ROUTE'}</div>
            <div class="tri-state ${rutaState.cssClass}">${rutaState.label}</div>
          </div>
          <div class="tri-vertex">
            <div class="tri-icon">◎</div>
            <div class="tri-name">${lang === 'es' ? 'MENSAJE' : 'MESSAGE'}</div>
            <div class="tri-state ${msgState.cssClass}">${msgState.label}</div>
          </div>
          <div class="tri-vertex">
            <div class="tri-icon">◈</div>
            <div class="tri-name">${lang === 'es' ? 'OFERTA' : 'OFFER'}</div>
            <div class="tri-state ${ofertaState.cssClass}">${ofertaState.label}</div>
          </div>
        </div>
      </div>

      <div class="result-body">${formatted}</div>
      <button class="btn-download" onclick="downloadPDF()">
        📄 ${lang === 'es' ? 'Descargar diagnóstico en PDF' : 'Download diagnosis as PDF'}
      </button>
      <button class="btn-restart" onclick="restartQuiz()">${t('restart')}</button>
    </div>
  `;
}

function downloadPDF() {
  const businessName = answers['nombre'] ? answers['nombre'].split('—')[1]?.trim() || answers['nombre'].split('-')[1]?.trim() || answers['nombre'] : 'Diagnostico';
  const originalTitle = document.title;
  document.title = `Ruta Digital — Diagnostico ${businessName}`;
  window.print();
  document.title = originalTitle;
}

function restartQuiz() {
  step = -1;
  answers = {};
  multiSelected = {};
  renderIntro();
  window.scrollTo(0, 0);
}

// Init
renderIntro();
</script>
